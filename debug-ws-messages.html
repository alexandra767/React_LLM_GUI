<!DOCTYPE html>
<html>
<head>
    <title>Debug WebSocket Messages</title>
</head>
<body>
    <h1>WebSocket Message Debugger</h1>
    <button onclick="testGeneration()">Generate Test Image</button>
    <pre id="log"></pre>
    
    <script>
        const log = document.getElementById('log');
        const clientId = 'debug-' + Math.random().toString(36).substring(7);
        
        function addLog(msg) {
            log.textContent += msg + '\n';
            console.log(msg);
        }
        
        async function testGeneration() {
            // Connect WebSocket first
            const ws = new WebSocket(`ws://localhost:8188/ws?clientId=${clientId}`);
            const messages = [];
            
            ws.onopen = () => addLog('WebSocket connected');
            
            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                messages.push(msg);
                addLog(`\n=== MESSAGE ${messages.length} ===`);
                addLog(JSON.stringify(msg, null, 2));
                
                // Look for SaveImage output
                if (msg.type === 'executed' && msg.data?.node && msg.data?.output?.images) {
                    addLog('\n🎉 FOUND IMAGE OUTPUT!');
                    addLog('Node: ' + msg.data.node);
                    addLog('Images: ' + JSON.stringify(msg.data.output.images));
                }
            };
            
            // Wait for connection
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            // Submit simple workflow
            const workflow = {
                "4": { "inputs": { "ckpt_name": "v1-5-pruned-emaonly.ckpt" }, "class_type": "CheckpointLoaderSimple" },
                "5": { "inputs": { "width": 512, "height": 512, "batch_size": 1 }, "class_type": "EmptyLatentImage" },
                "6": { "inputs": { "text": "test", "clip": ["4", 1] }, "class_type": "CLIPTextEncode" },
                "3": { 
                    "inputs": { 
                        "seed": 12345, "steps": 5, "cfg": 7, "sampler_name": "euler", 
                        "scheduler": "normal", "denoise": 1, "model": ["4", 0], 
                        "positive": ["6", 0], "negative": ["6", 0], "latent_image": ["5", 0] 
                    }, 
                    "class_type": "KSampler" 
                },
                "8": { "inputs": { "samples": ["3", 0], "vae": ["4", 2] }, "class_type": "VAEDecode" },
                "9": { "inputs": { "filename_prefix": "Debug", "images": ["8", 0] }, "class_type": "SaveImage" }
            };
            
            const response = await fetch('http://localhost:8188/prompt', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: workflow, client_id: clientId })
            });
            
            const result = await response.json();
            addLog('\nPrompt response: ' + JSON.stringify(result));
        }
    </script>
</body>
</html>
