<!DOCTYPE html>
<html>
<head>
    <title>ComfyUI WebSocket Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        button { padding: 10px 20px; margin: 10px; }
        #messages { 
            margin: 20px 0; 
            padding: 10px; 
            background: #f0f0f0; 
            height: 400px; 
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .message { margin: 5px 0; padding: 5px; background: white; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>ComfyUI WebSocket Test</h1>
    
    <button onclick="connectWS()">Connect WebSocket</button>
    <button onclick="generateSimpleImage()">Generate Simple Image</button>
    <button onclick="clearMessages()">Clear Messages</button>
    
    <div id="messages"></div>
    
    <script>
        let ws = null;
        let clientId = 'test-' + Math.random().toString(36).substring(7);
        const messages = document.getElementById('messages');
        
        function log(message, type = '') {
            const div = document.createElement('div');
            div.className = 'message ' + type;
            div.textContent = `${new Date().toLocaleTimeString()}: ${message}`;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
            console.log(message);
        }
        
        function clearMessages() {
            messages.innerHTML = '';
        }
        
        function connectWS() {
            if (ws) {
                ws.close();
            }
            
            log('Connecting to WebSocket with clientId: ' + clientId);
            ws = new WebSocket(`ws://localhost:8188/ws?clientId=${clientId}`);
            
            ws.onopen = () => {
                log('✅ WebSocket connected!', 'success');
            };
            
            ws.onmessage = (event) => {
                try {
                    const message = JSON.parse(event.data);
                    log('📥 Message: ' + JSON.stringify(message, null, 2));
                    
                    // Log specific message types
                    if (message.type) {
                        log(`Message type: ${message.type}`, 'success');
                        if (message.data && message.data.node) {
                            log(`Executing node: ${message.data.node}`);
                        }
                        if (message.data && message.data.output) {
                            log(`Output: ${JSON.stringify(message.data.output)}`, 'success');
                        }
                    }
                } catch (error) {
                    log('Failed to parse message: ' + event.data, 'error');
                }
            };
            
            ws.onerror = (error) => {
                log('❌ WebSocket error', 'error');
            };
            
            ws.onclose = () => {
                log('WebSocket closed');
            };
        }
        
        async function generateSimpleImage() {
            try {
                log('Starting simple image generation...');
                
                // Very simple workflow
                const workflow = {
                    "4": {
                        "inputs": {
                            "ckpt_name": "v1-5-pruned-emaonly.ckpt"
                        },
                        "class_type": "CheckpointLoaderSimple"
                    },
                    "5": {
                        "inputs": {
                            "width": 512,
                            "height": 512,
                            "batch_size": 1
                        },
                        "class_type": "EmptyLatentImage"
                    },
                    "6": {
                        "inputs": {
                            "text": "a beautiful sunset",
                            "clip": ["4", 1]
                        },
                        "class_type": "CLIPTextEncode"
                    },
                    "3": {
                        "inputs": {
                            "seed": 123456,
                            "steps": 10,
                            "cfg": 7,
                            "sampler_name": "euler",
                            "scheduler": "normal",
                            "denoise": 1,
                            "model": ["4", 0],
                            "positive": ["6", 0],
                            "negative": ["6", 0],
                            "latent_image": ["5", 0]
                        },
                        "class_type": "KSampler"
                    },
                    "8": {
                        "inputs": {
                            "samples": ["3", 0],
                            "vae": ["4", 2]
                        },
                        "class_type": "VAEDecode"
                    },
                    "9": {
                        "inputs": {
                            "filename_prefix": "TestWS",
                            "images": ["8", 0]
                        },
                        "class_type": "SaveImage"
                    }
                };
                
                log('Workflow: ' + JSON.stringify(workflow, null, 2));
                
                // Submit workflow
                const response = await fetch('http://localhost:8188/prompt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: workflow,
                        client_id: clientId
                    })
                });
                
                const data = await response.json();
                log('Response: ' + JSON.stringify(data, null, 2));
                
                if (data.prompt_id) {
                    log('✅ Prompt queued! ID: ' + data.prompt_id, 'success');
                } else if (data.error) {
                    log('❌ Error: ' + JSON.stringify(data.error), 'error');
                }
                
            } catch (error) {
                log('❌ Failed: ' + error.message, 'error');
            }
        }
    </script>
</body>
</html>
