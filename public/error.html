<!DOCTYPE html>
<html>
<head>
    <title>Error Loading App</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
            color: #333;
        }
        .error-container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #d32f2f;
            margin-top: 0;
        }
        .details {
            margin: 1.5rem 0;
            text-align: left;
            background: #f9f9f9;
            padding: 1rem;
            border-radius: 4px;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .action {
            margin-top: 1.5rem;
        }
        button {
            background: #1976d2;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }
        button:hover {
            background: #1565c0;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>Error Loading Application</h1>
        <p>We're sorry, but something went wrong while trying to load the application.</p>
        <div class="details" id="errorDetails">
            Please check the console for more details.
        </div>
        <div class="action">
            <button onclick="window.location.reload()">Reload Application</button>
        </div>
    </div>
    <script>
        // Show any error details if available
        window.addEventListener('error', function(event) {
            const errorDetails = document.getElementById('errorDetails');
            errorDetails.textContent = event.message + '\n\n' + event.filename + ' (line ' + event.lineno + ')';
        });
    </script>
</body>
</html>
